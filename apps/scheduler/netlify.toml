# Netlify: set site "Base directory" / "Package directory" to `apps/scheduler` in the UI.

[build]
  command = "cd ../.. && npm install --include=optional && npm run build --workspace=scheduler"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10.9.2"
  CI = "true"
  NODE_ENV = "production"
  NPM_FLAGS = "--include=optional"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
