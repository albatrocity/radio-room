<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Listening Room Bridge — Spotify</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #121212;
        color: #b3b3b3;
        margin: 24px;
      }
      #status {
        white-space: pre-wrap;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Listening Room Bridge</h1>
    <p>Spotify Web Playback SDK device host. Keep this tab open while the bridge is connected.</p>
    <div id="status">Waiting for bridge…</div>
    <script>
      ;(function () {
        var statusEl = document.getElementById("status")
        var warmedToken = null
        var connectTimer = null

        function setStatus(msg) {
          statusEl.textContent = msg
          console.log("[spotify-sdk]", msg)
        }

        function clearConnectTimer() {
          if (connectTimer) {
            clearTimeout(connectTimer)
            connectTimer = null
          }
        }

        window.__spotifyCreatePlayer = function () {
          if (typeof Spotify === "undefined" || !Spotify.Player) {
            setStatus("Spotify SDK not loaded")
            return false
          }

          var player = new Spotify.Player({
            name: "Listening Room Bridge",
            getOAuthToken: function (cb) {
              if (warmedToken) {
                cb(warmedToken)
                return
              }
              if (typeof window.__bridgeGetSpotifyToken !== "function") {
                setStatus("Token bridge missing")
                cb("")
                return
              }
              window
                .__bridgeGetSpotifyToken()
                .then(function (token) {
                  warmedToken = token || ""
                  cb(warmedToken)
                })
                .catch(function (err) {
                  setStatus("Token error: " + (err && err.message ? err.message : err))
                  cb("")
                })
            },
            volume: 1.0,
          })

          player.addListener("ready", function (state) {
            clearConnectTimer()
            setStatus("Ready — device_id=" + state.device_id)
            try {
              if (typeof player.activateElement === "function") {
                player.activateElement()
              }
            } catch (e) {
              console.warn("[spotify-sdk] activateElement failed", e)
            }
            if (typeof window.__bridgeSpotifyReady === "function") {
              window.__bridgeSpotifyReady(state.device_id)
            }
          })

          player.addListener("not_ready", function (state) {
            setStatus("Not ready — device_id=" + state.device_id)
            if (typeof window.__bridgeSpotifyNotReady === "function") {
              window.__bridgeSpotifyNotReady(state.device_id)
            }
          })

          player.addListener("initialization_error", function (e) {
            clearConnectTimer()
            setStatus("initialization_error: " + e.message)
            if (typeof window.__bridgeSpotifyError === "function") {
              window.__bridgeSpotifyError("initialization_error", e.message)
            }
          })
          player.addListener("authentication_error", function (e) {
            clearConnectTimer()
            warmedToken = null
            setStatus(
              "authentication_error: " +
                e.message +
                "\n(Re-link Spotify on the room creator if streaming scope is missing.)",
            )
            if (typeof window.__bridgeSpotifyError === "function") {
              window.__bridgeSpotifyError("authentication_error", e.message)
            }
          })
          player.addListener("account_error", function (e) {
            clearConnectTimer()
            setStatus("account_error: " + e.message + " (Premium required for Web Playback SDK)")
            if (typeof window.__bridgeSpotifyError === "function") {
              window.__bridgeSpotifyError("account_error", e.message)
            }
          })
          player.addListener("playback_error", function (e) {
            setStatus("playback_error: " + e.message)
          })

          setStatus("Connecting Spotify player…")
          connectTimer = setTimeout(function () {
            setStatus(
              "Still connecting after 20s.\n" +
                "Token is usually fine if search works — this is often Chrome blocking the SDK iframe (sdk.scdn.co).\n" +
                "Quit the bridge Chrome completely (not just the tab), restart bridge-daemon serve, and retry.\n" +
                "CORS on api.spotify.com/track-playback means the SDK failed to get a client-token.",
            )
          }, 20000)

          player.connect().then(function (ok) {
            if (!ok) {
              clearConnectTimer()
              setStatus("player.connect() returned false")
            }
          })

          window.__spotifyPlayer = player
          return true
        }

        window.__bridgeSpotifyBoot = window.__bridgeSpotifyBoot || null

        window.onSpotifyWebPlaybackSDKReady = function () {
          function run() {
            if (typeof window.__bridgeGetSpotifyToken !== "function") {
              setStatus("Waiting for bridge daemon…")
              var tries = 0
              var t = setInterval(function () {
                tries++
                if (typeof window.__bridgeGetSpotifyToken === "function") {
                  clearInterval(t)
                  boot()
                } else if (tries > 50) {
                  clearInterval(t)
                  setStatus("Bridge daemon did not attach (__bridgeGetSpotifyToken missing)")
                }
              }, 200)
              return
            }
            boot()
          }

          function boot() {
            setStatus("Fetching Spotify token…")
            window
              .__bridgeGetSpotifyToken()
              .then(function (token) {
                warmedToken = token || ""
                if (!warmedToken) {
                  setStatus("Empty Spotify token from API")
                  return
                }
                setStatus("Creating Spotify player…")
                window.__spotifyCreatePlayer()
              })
              .catch(function (err) {
                setStatus("Token error: " + (err && err.message ? err.message : err))
              })
          }

          run()
        }
      })()
    </script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
  </body>
</html>
