name: Deploy MediaMTX

on:
  push:
    branches: [main]
    paths:
      - "infra/mediamtx/**"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    environment: rb-radio-listener
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase; github.repository can be mixed case.
      - name: Image name (lowercase for GHCR)
        id: image
        run: |
          img="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/mediamtx"
          echo "image_name=$img" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: infra/mediamtx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.image.outputs.image_name }}
          GITHUB_OWNER: ${{ steps.image.outputs.owner_lc }}
          GHCR_PULL_TOKEN: ${{ secrets.MEDIAMTX_GHCR_TOKEN }}
        with:
          host: ${{ secrets.MEDIAMTX_HOST }}
          username: ${{ secrets.MEDIAMTX_USER }}
          key: ${{ secrets.MEDIAMTX_SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,GITHUB_OWNER,GHCR_PULL_TOKEN
          script: |
            set -e
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            if [ -n "${GHCR_PULL_TOKEN:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | $SUDO docker login "$REGISTRY" -u "$GITHUB_OWNER" --password-stdin
            fi
            $SUDO docker pull "$REGISTRY/$IMAGE_NAME:latest" || {
              echo "ERROR: docker pull failed. If the GHCR package is private, set secret MEDIAMTX_GHCR_TOKEN (PAT with read:packages) or make the package public under Packages → mediamtx → Package settings."
              exit 1
            }
            $SUDO docker stop mediamtx || true
            $SUDO docker rm mediamtx || true
            $SUDO mkdir -p /opt/mediamtx
            $SUDO test -f /opt/mediamtx/mediamtx.yml || {
              echo "ERROR: Missing /opt/mediamtx/mediamtx.yml. Run infra/mediamtx/scripts/provision-droplet-remote.sh or see infra/mediamtx/README.md."
              exit 1
            }
            $SUDO docker run -d \
              --name mediamtx \
              --restart unless-stopped \
              -p 1935:1935 \
              -p 8888:8888 \
              -p 8889:8889 \
              -p 8189:8189/udp \
              -v /opt/mediamtx/mediamtx.yml:/mediamtx.yml:ro \
              "$REGISTRY/$IMAGE_NAME:latest"
