name: Deploy MediaMTX

on:
  push:
    branches: [main]
    paths:
      - "infra/mediamtx/**"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    environment: rb-radio-listener
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase; github.repository can be mixed case.
      - name: Image name (lowercase for GHCR)
        id: image
        run: |
          img="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/mediamtx"
          echo "image_name=$img" >> "$GITHUB_OUTPUT"
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: infra/mediamtx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.image_name }}:${{ github.sha }}

      # Host/DNS is not secret — often stored as an Actions *Variable* (repo or environment).
      # If you only set vars.MEDIAMTX_HOST, secrets.MEDIAMTX_HOST is empty → appleboy "missing server host".
      - name: Resolve SSH host and validate deploy credentials
        id: deploy_target
        run: |
          set -e
          HOST="${{ vars.MEDIAMTX_HOST }}"
          if [ -z "$HOST" ]; then HOST="${{ secrets.MEDIAMTX_HOST }}"; fi
          if [ -z "$HOST" ]; then
            echo "::error::MEDIAMTX_HOST is empty. Add an Actions **Variable** or **Secret** named MEDIAMTX_HOST:"
            echo "  Settings → Secrets and variables → Actions → Variables (repository), OR"
            echo "  Settings → Environments → rb-radio-listener → Environment variables / Secrets"
            exit 1
          fi
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "SSH host resolved (length ${#HOST})"
          if [ -z "${{ secrets.MEDIAMTX_USER }}" ]; then
            echo "::error::MEDIAMTX_USER secret is empty (environment rb-radio-listener or repository secrets)."
            exit 1
          fi
          if [ -z "${{ secrets.MEDIAMTX_SSH_KEY }}" ]; then
            echo "::error::MEDIAMTX_SSH_KEY secret is empty."
            exit 1
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.deploy_target.outputs.host }}
          username: ${{ secrets.MEDIAMTX_USER }}
          key: ${{ secrets.MEDIAMTX_SSH_KEY }}
          script: |
            set -e
            REGISTRY="ghcr.io"
            IMAGE_NAME="${{ steps.image.outputs.image_name }}"
            OWNER="${{ steps.image.outputs.owner_lc }}"
            echo "Deploy: pull $REGISTRY/$IMAGE_NAME:latest"
            if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
            if ! command -v docker >/dev/null 2>&1; then
              echo "ERROR: docker is not installed on the server. SSH in and run: curl -fsSL https://get.docker.com | sudo sh"
              exit 1
            fi
            if [ -n "${{ secrets.MEDIAMTX_GHCR_TOKEN }}" ]; then
              echo "${{ secrets.MEDIAMTX_GHCR_TOKEN }}" | $SUDO docker login "$REGISTRY" -u "$OWNER" --password-stdin
            fi
            $SUDO docker pull "$REGISTRY/$IMAGE_NAME:latest" || {
              echo "ERROR: docker pull failed. If the GHCR package is private, add MEDIAMTX_GHCR_TOKEN (PAT with read:packages) to environment rb-radio-listener, or make the mediamtx package public."
              exit 1
            }
            $SUDO docker stop mediamtx || true
            $SUDO docker rm mediamtx || true
            $SUDO mkdir -p /opt/mediamtx
            $SUDO test -f /opt/mediamtx/mediamtx.yml || {
              echo "ERROR: Missing /opt/mediamtx/mediamtx.yml. Run infra/mediamtx/scripts/provision-droplet-remote.sh or see infra/mediamtx/README.md."
              exit 1
            }
            $SUDO docker run -d \
              --name mediamtx \
              --restart unless-stopped \
              --network host \
              -e API_URL="${{ vars.API_URL }}" \
              -e STREAM_HEALTH_SECRET="${{ secrets.STREAM_HEALTH_SECRET }}" \
              -v /opt/mediamtx/mediamtx.yml:/mediamtx.yml:ro \
              "$REGISTRY/$IMAGE_NAME:latest"
            if command -v caddy >/dev/null 2>&1; then
              echo "Caddy detected; reloading config..."
              $SUDO systemctl reload caddy || true
            fi
