name: Deploy MediaMTX

on:
  push:
    branches: [main]
    paths:
      - "infra/mediamtx/**"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mediamtx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: infra/mediamtx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MEDIAMTX_HOST }}
          username: ${{ secrets.MEDIAMTX_USER }}
          key: ${{ secrets.MEDIAMTX_SSH_KEY }}
          script: |
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop mediamtx || true
            docker rm mediamtx || true
            docker run -d \
              --name mediamtx \
              --restart unless-stopped \
              -p 1935:1935 \
              -p 8888:8888 \
              -p 8889:8889 \
              -p 8189:8189/udp \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
