services:
  web:
    container_name: web
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot reloading
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts
    environment:
      - NODE_ENV=development
      # Use 127.0.0.1 (loopback) instead of localhost per Spotify's requirements
      - VITE_API_URL=${VITE_API_URL:-http://127.0.0.1:3000}
      # Internal Docker network URL for Vite proxy (server-side)
      - API_INTERNAL_URL=http://api:3000
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
      target: installer
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/tsconfig.json:/app/apps/api/tsconfig.json
      - ./packages:/app/packages
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - SESSION_SECRET=dev-secret-change-in-production
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - TIDAL_CLIENT_ID=${TIDAL_CLIENT_ID}
      - TIDAL_CLIENT_SECRET=${TIDAL_CLIENT_SECRET}
      - TIDAL_REDIRECT_URI=${TIDAL_REDIRECT_URI:-http://127.0.0.1:3000/auth/tidal/callback}
      # Use 127.0.0.1 (loopback) instead of localhost per Spotify's requirements
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-http://127.0.0.1:3000/auth/spotify/callback}
      - APP_URL=${APP_URL:-http://127.0.0.1:8000}
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://listening_room:listening_room@postgres:5432/listening_room
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-better-auth-secret-change-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - app_network
    command: ["npx", "tsx", "watch", "apps/api/src/server.ts"]

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app_network

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: listening_room
      POSTGRES_PASSWORD: listening_room
      POSTGRES_DB: listening_room
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app_network

  scheduler:
    container_name: scheduler
    build:
      context: .
      dockerfile: ./apps/scheduler/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      # Mount entire app directory so TanStack Router's .tanstack/tmp/ and src/
      # share the same filesystem (avoids EXDEV rename errors in Docker)
      - ./apps/scheduler:/app/apps/scheduler
    environment:
      - NODE_ENV=development
      # Use loopback (127.0.0.1) for VITE_API_URL so it matches Spotify redirect URIs and stays same-site with the web/scheduler apps when you open them at http://127.0.0.1:* (not localhost).
      - VITE_API_URL=${VITE_API_URL:-http://127.0.0.1:3000}
      - VITE_WEB_URL=${VITE_WEB_URL:-http://127.0.0.1:8000}
      - API_INTERNAL_URL=http://api:3000
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      - api

  load-tester:
    build:
      context: .
      dockerfile: ./apps/load-tester/Dockerfile
    volumes:
      - ./apps/load-tester/scenarios:/app/scenarios
    environment:
      - NODE_ENV=production
    networks:
      - app_network
    depends_on:
      - api
    profiles:
      - testing  # Only start with: docker compose --profile testing up load-tester

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"       # RTMP ingest
      - "8888:8888"       # LL-HLS output (fallback)
      - "8889:8889"       # WebRTC WHEP signaling (primary)
      - "8189:8189/udp"   # WebRTC ICE/media
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - app_network
    profiles:
      - live              # Only start with: docker compose --profile live up

volumes:
  redis-data:
  postgres-data:

networks:
  app_network:
