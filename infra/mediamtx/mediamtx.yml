# MediaMTX configuration for Listening Room
# Accepts RTMP ingest and serves WebRTC (WHEP) + LL-HLS output.
#
# RTMP ingest:          rtmp://localhost:1935/{streamKey}
# WebRTC playback:      http://localhost:8889/{streamKey}/whep
# LL-HLS playback:      http://localhost:8888/{streamKey}/index.m3u8

###############################################
# General

logLevel: info
logDestinations: [stdout]

###############################################
# RTMP (ingest)

rtmp: true
rtmpAddress: :1935

###############################################
# HLS (LL-HLS fallback output)

hls: true
hlsAddress: :8888
hlsVariant: lowLatency
hlsAlwaysRemux: true

###############################################
# WebRTC (primary low-latency output via WHEP)

webrtc: true
webrtcAddress: :8889
# Allow WHEP from another origin (e.g. web app on http://127.0.0.1:8000, MediaMTX on LAN IP).
webrtcAllowOrigins: ["*"]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# ICE candidates must be reachable from browsers. In Docker/LAN, add the host IP clients use
# (not 127.0.0.1 from the browser’s perspective). Example for a Mac at 192.168.86.24:
webrtcAdditionalHosts:
  - 192.168.86.24

# Note: WebRTC to Docker on a LAN can still fail ICE in some browsers; the web app tries WHEP
# first then falls back to LL-HLS. A public VPS with correct webrtcAdditionalHosts often works without fallback.

###############################################
# Disabled protocols

rtsp: false
srt: false

###############################################
# Paths

paths:
  all_others:
    source: publisher
